name: Release

# Push a tag like "v0.2.0" (matching the version in package.json) to build
# and publish a release for Windows and Linux, with auto-generated notes
# from the commits since the last release. That release body is exactly
# what shows up as the changelog in the app's update-ready screen.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft --generate-notes \
            --title "CartKey ${{ github.ref_name }}"

      # gh release assets always show every uploaded file, including the
      # .yml/.blockmap auto-update metadata electron-updater needs — there's
      # no way to hide those from a human browsing the release, so just tell
      # people up front which file is actually the one to download.
      - name: Add download guidance to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json body -q .body)
          {
            echo "**Download:** Windows — the \`.exe\`. Linux — \`.AppImage\` (portable), \`.deb\` (Debian/Ubuntu), or \`.pacman\` (Arch). Ignore the \`.yml\`/\`.blockmap\` files below, those are auto-update metadata, not for you."
            echo ""
            echo "$NOTES"
          } > /tmp/release-notes.md
          gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --notes-file /tmp/release-notes.md

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # node-gyp needs winscard.h to compile the native PC/SC binding
      # (@pokusew/pcsclite), and electron-builder's pacman target shells out
      # to bsdtar (from libarchive-tools) to build the mtree-format archive —
      # neither is present on the runner by default. Windows already has the
      # equivalent PC/SC headers built into its SDK, so no step needed there.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev libarchive-tools

      - run: npm ci

      - run: npm run build

      - name: Build and publish to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
